<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login | Tokyo Academy </title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Kanit', sans-serif;
        }

        /* 1. เปลี่ยนพื้นหลังเป็น Linear Gradient ตามรูป */
        body {
            background: #EAE9E8;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2vw;
        }

        .main-wrapper {
            width: 100%;
            max-width: 1400px;
            height: 85vh;
            min-height: 550px;
            display: flex;
            position: relative;
        }

        /* ฝั่งซ้าย: Tokyo Academy & Welcome */
        .left-content {
            flex: 1.2;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 40px;
            color: white;
        }

        .brand {
            font-size: clamp(24px, 4vw, 36px);
            font-weight: 700;
            line-height: 0.9;
            letter-spacing: 1px;
            text-shadow: 4px 6px 20px rgba(0,0,0,0.3)
        }

        .welcome-text {
            font-size: clamp(50px, 9vw, 130px);
            font-weight: 700;
            line-height: 0.9;
            margin-bottom: 10px;
            /* ปรับเงาให้ซอฟต์ลงเพื่อให้เข้ากับ Gradient */
            text-shadow: 4px 6px 20px rgba(0,0,0,0.3);
        }

        /* ฝั่งขวา: กล่อง Login */
        .right-content {
            flex: 1;
            display: flex;
            justify-content: flex-end;
            align-items: center;
        }

        .login-card {
            background-color: white;
            width: 100%;
            max-width: 480px;
            height: 100%;
            border-radius: 60px;
            padding: 60px 45px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
        }

        .login-card h2 {
            font-size: clamp(28px, 3vw, 42px);
            margin-bottom: 40px;
            font-weight: 700;
            color: #222;
        }

        /* ฟอร์ม */
        .input-group {
            margin-bottom: 25px;
        }

        .input-group label {
            display: block;
            font-size: 14px;
            margin-bottom: 8px;
            color: #666;
            font-weight: 500;
        }

        .input-group input {
            width: 100%;
            padding: 16px 22px;
            background-color: #f1f3f5;
            border: 2px solid transparent;
            border-radius: 20px;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }

        /* เอฟเฟกต์ตอนคลิกช่องกรอก ให้สีกรอบเข้ากับ Gradient */
        .input-group input:focus {
            background-color: white;
            border-color: #4e4e4e;
        }

        .login-btn {
            width: 100%;
            padding: 18px;
            background-color: #121212;
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            transition: transform 0.2s, background-color 0.2s;
        }

        .login-btn:hover {
            background-color: #333;
            transform: translateY(-2px);
        }

        /* Responsive สำหรับมือถือ */
        @media (max-width: 850px) {
            .main-wrapper {
                flex-direction: column;
                height: auto;
                gap: 30px;
            }
            .left-content {
                padding: 20px 10px;
                text-align: center;
                align-items: center;
                height: auto;
            }
            .welcome-text {
                font-size: 65px;
                margin-top: 40px;
            }
            .login-card {
                max-width: 100%;
                border-radius: 45px;
                padding: 40px 30px;
            }
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <div class="left-content">
            <div class="brand">Tokyo Academy</div>
            <h1 class="welcome-text">Welcome!</h1>
        </div>

        <div class="right-content">
            <div class="login-card">
                <h2>Log in</h2>
                
                <form method="POST">
                    {% csrf_token %}
                    
                    <div class="input-group">
                        <label>Username</label>
                        <input type="text" name="username" placeholder="Username" required>
                    </div>

                    <div class="input-group">
                        <label>Password</label>
                        <input type="password" name="password" placeholder="••••••••" required>
                    </div>

                    <button type="submit" class="login-btn">Log in</button>
                </form>
            </div>
        </div>
    </div>

</body>
</html>
